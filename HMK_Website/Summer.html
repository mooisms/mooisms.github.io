<!DOCTYPE html>
<html>
<head>
    <title>what season are you?</title>
<style>

body, html {
  height: 100%;
  margin: 0;
}

.bg {
 
  background-image: url("https://images.pexels.com/photos/1457812/pexels-photo-1457812.jpeg");

  
  height: 100%; 

  
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}


.centered {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
   color:#FFFFFF;
   font-size: 30px;
    text-shadow: 2px 2px 4px #FFFFFF;
}

.bottomcentered1 {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
     color:#F57C2D;
   font-size: 50px;
text-shadow: 2px 2px 4px #FFFFFF;

 }

</style>
</head>
<body>



<div class="bg"></div>
<div class="centered">Your season is</div>
<div class="bottomcentered1"> Summer</div>



</body>
</html>
